<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشيخ علي - الموقع الرسمي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات الألوان الأساسية المتناسقة مع الفخامة */
        :root {
            --primary-gold: #D4AF37;
            --dark-bg: #0d0d0d;
            --sec-bg: #1a1a1a;
            --text-light: #f4f4f4;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* تنسيق الهيدر (الشريط العلوي) */
        header {
            background-color: var(--sec-bg);
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-gold);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .logo {
            font-family: 'Amiri', serif;
            font-size: 2.2rem;
            color: var(--primary-gold);
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 1px;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--primary-gold);
        }

        /* تنسيق القسم الرئيسي (Hero Section) */
        .hero {
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            /* يمكنك استبدال الرابط أدناه بصورة خلفية إسلامية أو زخرفة تناسب المحتوى */
            background: linear-gradient(rgba(13, 13, 13, 0.85), rgba(13, 13, 13, 0.95)), url('https://images.unsplash.com/photo-1584286595398-a59f21d313f5?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
        }

        .hero h1 {
            font-family: 'Amiri', serif;
            font-size: 4.5rem;
            color: var(--primary-gold);
            margin-bottom: 20px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
        }

        .hero p {
            font-size: 1.4rem;
            color: var(--text-light);
            max-width: 700px;
            margin-bottom: 40px;
        }

        .cta-button {
            padding: 15px 40px;
            background-color: transparent;
            border: 2px solid var(--primary-gold);
            color: var(--primary-gold);
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
        }

        .cta-button:hover {
            background-color: var(--primary-gold);
            color: var(--dark-bg);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        /* تنسيق الفوتر */
        footer {
            text-align: center;
            padding: 25px;
            background-color: var(--sec-bg);
            color: var(--text-muted);
            border-top: 1px solid #333;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">الشيخ علي</a>
        <nav>
            <a href="#">الرئيسية</a>
            <a href="#">المقالات</a>
            <a href="#">المكتبة الصوتية</a>
            <a href="#">اتصل بنا</a>
        </nav>
    </header>

    <section class="hero">
        <h1>الشيخ علي</h1>
        <p>مرحباً بكم في المنصة الرسمية. نسعى لتقديم المحتوى الهادف بطابع عصري ومتميز، ليكون مرجعاً موثوقاً لكل باحث عن المعرفة.</p>
        <a href="#" class="cta-button">تصفح المحتوى</a>
    </section>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 - موقع الشيخ علي</p>
    </footer>

</body>
</html>
