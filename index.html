<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> رسائلي لك يا جميلتي 💖</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

  body {
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
    color: #fff;
  }

  /* Login Screen */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    text-align: center;
  }

  #loginScreen input {
    padding: 10px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    text-align: center;
  }

  #loginScreen button {
    padding: 10px 20px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #fff;
    color: #ff6b81;
    transition: 0.3s;
  }

  #loginScreen button:hover { background: #ff6b81; color: #fff; }

  /* Main content */
  #mainContent { display: none; flex-direction: column; align-items: center; padding: 20px; }

  h1 { font-size: 3em; margin-bottom: 40px; text-align: center; }

  .cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    max-width: 1000px;
  }

  .card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    width: 250px;
    min-height: 250px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    text-align: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: transform 0.5s, background 0.5s;
  }

  .card:hover { transform: scale(1.1) rotate(-2deg); background: rgba(255, 255, 255, 0.25); }

  .card img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin-bottom: 10px;
    border: 3px solid #ffffff;
    object-fit: cover;
  }

  .card i {
    font-size: 2em;
    margin-bottom: 10px;
    color: #ff6b81;
    animation: heartbeat 1s infinite;
  }

  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); }
  }

  .message {
    margin-top: 10px;
    font-size: 1em;
    color: #000000;
    line-height: 1.3;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.6s ease, padding 0.6s ease;
  }

  .message.show {
    max-height: 200px;
    padding: 10px;
  }

  /* Floating hearts */
  .heart {
    position: absolute;
    width: 50px;
    height: 50px;
    background: url('https://i.postimg.cc/7ZgqTt7k/heart.png') no-repeat center center;
    background-size: contain;
    animation: floatUp 5s linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0.5); opacity: 0.7; }
    50% { opacity: 1; }
    100% { transform: translateY(-100px) scale(1); opacity: 0; }
  }

  button.musicBtn {
    margin-top: 30px;
    padding: 15px 30px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    background: #fff;
    color: #ff6b81;
    cursor: pointer;
    transition: 0.3s;
  }

  button.musicBtn:hover { background: #ff6b81; color: #fff; transform: scale(1.1); }
</style>
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen">
    <h2>أدخل كلمة المرور يا عسوول  💖</h2>
    <input type="password" id="passwordInput" placeholder="كلمة المرور">
    <button onclick="checkPassword()">دخول</button>
  </div>

<!-- Main Content -->
<div id="mainContent">
  <h1>رسائلي لك 💖</h1>
  <div class="cards">
    <div class="card" onclick="toggleMessage(this, 'حبيتك من كل قلبي واتخليت عن اي حد عشانك ياكل حياتي 🥺❤‍🩹')">
      <img src="photo/1.jpg" alt="صورة">
      <i class="fas fa-heart"></i>
      <div class="message"></div>
    </div>
    <div class="card" onclick="toggleMessage(this, 'مكنتش متخيل ان تيجي بنت زي السكر زيك تتحكم فيا وتعمل كل دا 😅🖤')">
      <img src="photo/2.jpg" alt="صورة">
      <i class="fas fa-heart"></i>
      <div class="message"></div>
    </div>
    <div class="card" onclick="toggleMessage(this, 'عمري ما امل منك ولا من رسايل ولا ابص لغيرك ومش هيبعدني عنك غير الموت 🥹❤‍🩹')">
      <img src="photo/3.jpg" alt="صورة">
      <i class="fas fa-heart"></i>
      <div class="message"></div>
    </div>
    <div class="card" onclick="toggleMessage(this, 'ولما بزعلك بيكون مش قاصد ازعلك والله وانا عمري ما بزعل منك 😭🖤')">
      <img src="photo/4.jpg" alt="صورة">
      <i class="fas fa-heart"></i>
      <div class="message"></div>
    </div>
    <div class="card" onclick="toggleMessage(this, 'يا أجمل حاجة حصلت في حيااااتي ياقلبي ياروحي ياعمري ')">
      <img src="photo/5.jpg" alt="صورة">
      <i class="fas fa-heart"></i>
      <div class="message"></div>
    </div>
  </div>
  <button class="musicBtn" onclick="playMusic()">تشغيل موسيقى رومانسية 🎵</button>
</div>

  <audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

<script>
  function checkPassword() {
    const input = document.getElementById('passwordInput').value;
    if(input === "112008") {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainContent').style.display = 'flex';
    } else {
      alert('أحاااا تاريخ ميلادك 🙄');
    }
  }

  function toggleMessage(card, text) {
    const msgDiv = card.querySelector('.message');
    if(msgDiv.classList.contains('show')) {
      msgDiv.classList.remove('show');
      msgDiv.textContent = '';
    } else {
      msgDiv.classList.add('show');
      msgDiv.textContent = text;
    }
  }

  function playMusic() {
    const music = document.getElementById('bgMusic');
    music.play();
  }

  function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = 4 + Math.random() * 3 + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 7000);
  }
  setInterval(createHeart, 500);
</script>
</body>
</html>
